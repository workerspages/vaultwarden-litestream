version: '3.8'

services:
  vaultwarden:
    image: ghcr.io/workerspages/vaultwarden-oss:latest
    container_name: vaultwarden-oss
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # -------------- Litestream / S3 配置 --------------
      # 端点 URL (例如: https://<account_id>.r2.cloudflarestorage.com 或 https://s3.us-east-1.amazonaws.com)
      - LITESTREAM_ENDPOINT=https://s3.example.com
      - LITESTREAM_ACCESS_KEY_ID=your_access_key
      - LITESTREAM_SECRET_ACCESS_KEY=your_secret_key
      - LITESTREAM_BUCKET=your_bucket_name
      - LITESTREAM_REGION=us-east-1
      # 存储路径包含文件名，例如 vaultwarden/db.sqlite3
      - LITESTREAM_PATH=vaultwarden/db.sqlite3
